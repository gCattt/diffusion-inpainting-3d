# Stable Diffusion inpainting

# directories
rgb_inpaint_dir: data/renders/rgb_inpaint
mask_dir: data/renders/masks
depth_dir: data/renders/depth
face_idx_dir: data/renders/face_idx
inpainted_dir: data/outputs/inpainted_views

# model / device
base_model_id: runwayml/stable-diffusion-inpainting
#base_model_id: stable-diffusion-v1-5/stable-diffusion-inpainting
controlnet_model_id: lllyasviel/sd-controlnet-depth
#base_model_id: sd2-community/stable-diffusion-2-inpainting
#controlnet_model_id: thibaud/controlnet-sd21-depth-diffusers
device: cpu   # or "cuda"
use_auth_token: null   # if private model, set your HF token string or use env var

# views
max_views: 4
rank_views_by_mask_coverage: true
mask_dilate: 3 # dilate mask by this many pixels to ensure better coverage of inpainted region, set to 0 to skip
same_noise_across_views: false

# inference params
seed: 1234
num_inference_steps: 60 # 25 - 100, higher = better quality but slower
strength: 0.95 # 0.85 - 1.0, higher = more aggressive inpainting, lower = more conservative and closer to original
guidance_scale: 5.5 # 5.0 - 7.0, higher = more closely follow prompt, lower = more freedom but less prompt guidance
padding_mask_crop: null
controlnet_conditioning_scale: 0.6 # 0.4 - 0.8, higher = more closely follow control image (depth), lower = more freedom but less structure guidance
negative_prompt: "blurry, out of focus, overexposed, artifacts, inconsistent lighting, unnatural material"
resize_to: 512  # optional: resize input to this square size before inpainting (None to skip)

# prompt default (override per run or set a general prompt)
prompt: "seamless texture continuation, identical material, same surface structure, high-frequency details, match surrounding color and noise, no new objects, no global changes, preserve lighting and perspective"