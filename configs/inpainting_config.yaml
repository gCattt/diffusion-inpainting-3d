# Stable Diffusion inpainting

# directories (absolute or relative to repo root)
rgb_inpaint_dir: data/renders/rgb_inpaint
mask_dir: data/renders/masks
depth_dir: data/renders/depth
face_idx_dir: data/renders/face_idx
inpainted_dir: data/outputs/inpainted_views

# model / device
base_model_id: runwayml/stable-diffusion-inpainting
#base_model_id: stable-diffusion-v1-5/stable-diffusion-inpainting
#controlnet_model_id: lllyasviel/sd-controlnet-depth
#base_model_id: sd2-community/stable-diffusion-2-inpainting
#controlnet_model_id: thibaud/controlnet-sd21-depth-diffusers
device: cpu   # or "cuda"
use_auth_token: null   # if private model, set your HF token string or use env var

# views
max_views: 4
rank_views_by_mask_coverage: true
mask_dilate: 3
same_noise_across_views: false

# inference params
seed: 1234
num_inference_steps: 50
strength: 0.95 # 0.85 - 1.0
guidance_scale: 5.5 # 4.5 - 7.0
padding_mask_crop: null
controlnet_conditioning_scale: 0.8
negative_prompt: "overexposed, blank areas, artifacts, inconsistent lighting, unnatural material"
resize_to: 512  # optional: resize input to this square size before inpainting (None to skip)

# prompt default (override per run or set a general prompt)
#prompt: "photorealistic texture restoration, consistent lighting, preserve fine surface details, high-frequency details, natural microstructure, realistic material, no smoothing, no blur, no artifacts, seamless texture"
#prompt: "repair only the missing regions, strictly preserve original texture outside mask, seamless continuation of existing surface, no global changes"
prompt: "seamless texture continuation, identical material, same surface structure, match surrounding color and noise, no new objects, no global changes, preserve lighting and perspective"