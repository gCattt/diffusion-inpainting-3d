rgb_inpaint_dir: data/renders/rgb_inpaint
mask_dir: data/renders/masks
depth_dir: data/renders/depth
face_idx_dir: data/renders/face_idx
cameras_dir: data/renders/cameras
inpainted_dir: data/outputs/inpainted_views

base_model_id: runwayml/stable-diffusion-inpainting 
controlnet_model_id: lllyasviel/control_v11f1p_sd15_depth
ip_adapter_model: h94/IP-Adapter
ip_adapter_weight: ip-adapter_sd15.bin
device: cuda   # cpu
use_auth_token: null   # if private model, set your HF token string or use env var

max_views: -1
mask_dilate: 12   # 0 to skip
same_noise_across_views: false

seed: 1234
num_inference_steps: 50
refinement_steps: 43
strength: 0.85
refinement_strength: 0.2
guidance_scale: 6.0
refinement_guidance_scale: 5.0
padding_mask_crop: 320
controlnet_conditioning_scale: 0.65
ip_adapter_scale: 0.1
negative_prompt: "oversmoothed, blurry, depth of field, out of focus, low quality, overexposed, artifacts, inconsistent lighting, unnatural material, glitches, deformations, color mismatch, low resolution"
resize_to: 512   # None to skip
max_angle: 1.1   # ~57°
min_overlap: 0.1
refinement_thresh: 0.30

prompt: "surface material, seamless texture continuation, preserve lighting and perspective, match surrounding color and pattern, high-frequency details"